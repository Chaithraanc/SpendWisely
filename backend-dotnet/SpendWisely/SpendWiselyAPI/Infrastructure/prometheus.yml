global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'spendwisely-api'
    static_configs:
      - targets: ['host.docker.internal:5285']

  - job_name: 'ai-consumer'
    static_configs:
      - targets: ['host.docker.internal:5285']

  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['host.docker.internal:15672']

  - job_name: 'mongodb'
    static_configs:
      - targets: ['host.docker.internal:27017']

  - job_name: 'redis'
    static_configs:
      - targets: ['host.docker.internal:6379']
